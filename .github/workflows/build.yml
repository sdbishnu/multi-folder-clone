name: Build and Publish Electron App

on:
  push:
    branches:
      - main

jobs:
  release:
    # pinning to windows-2025 explicitly clears the June 2026 redirection notice
    runs-on: windows-2025

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Upgraded to 24 to clear the deprecation warning
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Compile and Publish Desktop Executable
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # Forces the GitHub Runner to execute tasks natively under Node 24
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true